name: Commit God
on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 1 * * *"  # 08:17 WIB
    - cron: "43 4 * * *"  # 11:43 WIB
    - cron: "7 8 * * *"   # 15:07 WIB
    - cron: "31 11 * * *" # 18:31 WIB
    - cron: "52 14 * * *" # 21:52 WIB
  workflow_dispatch:

jobs:
  commit_god_has_spoken:
    runs-on: ubuntu-latest
    steps:
      - name: Set global directory
        run: git config --global --add safe.directory /github/workspace
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Consult the fortune teller
        id: fortune
        run: |
          git fetch origin main
          LAST_COMMIT_DATE=$(git log -1 --format="%ad" --date=format:'%Y-%m-%d' origin/main)
          TODAY=$(date '+%Y-%m-%d')

          if [ "$LAST_COMMIT_DATE" != "$TODAY" ]; then
            COUNT=$((RANDOM % 3 + 1))  # 1-3 commit, dijamin jalan
            echo "No commit today yet — MUST commit $COUNT time(s)"
          else
            ROLL=$((RANDOM % 100))
            if [ $ROLL -lt 55 ]; then
              COUNT=$((RANDOM % 2 + 1))  # 1-2 commit tambahan
              echo "Already committed today, adding $COUNT more"
            else
              COUNT=0
              echo "Already committed today, resting this round"
            fi
          fi

          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Perform the sacred ritual
        if: steps.fortune.outputs.count != '0'
        run: |
          git config --local user.email "linstrahl@gmail.com"
          git config --local user.name "linstrahl"

          MESSAGES=(
            "I have no idea why this works"
            "another commit, another regret"
            "it works… don't touch it!"
            "pushing to look productive"
            "just one more fix bro I swear"
            "+1 bug, +1 feature, perfectly balanced"
            "code was possessed, performed exorcism"
            "this is fine 🔥"
            "added feature nobody asked for"
            "why am I still doing this 💀"
            "its 3am and im still coding send help!"
            "works on my machine ¯\_(ツ)_/¯"
            "I should've been a farmer"
          )

          COUNT=${{ steps.fortune.outputs.count }}

          for i in $(seq 1 $COUNT); do
            DELAY=$((RANDOM % 480 + 60))
            echo "⏳ Waiting ${DELAY}s before commit $i/$COUNT..."
            sleep $DELAY

            echo "$(date '+%Y-%m-%d %H:%M:%S') — commit $i of $COUNT" >> LAST_UPDATED

            git add -A
            RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
            git commit -m "$RANDOM_MSG"
            echo "✅ Commit $i/$COUNT — $RANDOM_MSG"
          done

      - name: Ascend back to the heavens
        if: steps.fortune.outputs.count != '0'
        uses: ad-m/github-push-action@v0.6.0
        with:
          force: true
          directory: "."
          github_token: ${{ secrets.GITHUB_TOKEN }}
