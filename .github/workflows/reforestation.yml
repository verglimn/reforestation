name: Daily GitHub Reforestation

on:
  schedule:
  - cron: "0/5 * * * *"
  - cron: "15 0 * * *"
  - cron: "42 3 * * *"
  - cron: "07 6 * * *"
  - cron: "33 9 * * *"
  - cron: "51 12 * * *"
  - cron: "24 14 * * *"
  - cron: "10 16 * * *"
  workflow_dispatch:

jobs:
  auto_commit:
    name: Pretending to be productive
    runs-on: ubuntu-latest
    steps:
      - name: Gaslighting Git into thinking this directory is safe
        run: git config --global --add safe.directory /github/workspace
      - uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 1
          
      - name: Randomized daily intensity logic
        id: dice
        run: |
          ROLL=$(( $RANDOM % 100 + 1 ))
          if [ $ROLL -le 30 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Coffee break mode: ON. Skipping this commit."
            exit 0
          fi
          echo "Productivity mode: ON. Proceeding to plant a tree."

          MESSAGES=(
            "I have no idea why this works"
            "another commit, another regret"
            "it works… don't touch it!"
            "just one more fix bro I swear"
            "+1 bug, +1 feature, perfectly balanced"
            "added feature nobody asked for"
            "why am I still doing this"
            "works on my machine ¯\_(ツ)_/¯"
            "I should've been a farmer"
          )

          RANDOM_MSG=${MESSAGES[$RANDOM % ${#MESSAGES[@]}]}
          echo "COMMIT_MSG=$RANDOM_MSG" >> $GITHUB_ENV

      - name: Update activity timestamp
        if: steps.dice.outputs.skip != 'true'
        run: |
          d=$(date -u '+%A, %d-%m-%Y | %H:%M:%S UTC')
          echo "Sync: $d" > LAST_UPDATED
          
      - name: Generate randomized git contribution
        if: steps.dice.outputs.skip != 'true'
        run: |
          git config --local user.email "verglimn@gmail.com"
          git config --local user.name "verglimn"
          git add -A
          git commit -m "$COMMIT_MSG"
          
      - name: Synchronize changes to Origin
        uses: ad-m/github-push-action@v0.6.0
        with:
          force: true
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
